# Backing services for local development.
#
# In development the backend (make backend.up.dev) and frontend (make frontend.up.dev)
# run natively on the host; this file only provides the Postgres, Redis, and Mailpit
# services they talk to. Ports are published on 127.0.0.1 so the native processes can
# reach them. The application image itself is built only for production (see Dockerfile,
# published to GHCR by CI and orchestrated by Kubernetes).
services:
  # Mailpit (local SMTP for development)
  # For production we should use a managed email services e.g AWS SES SMTP interface
  mailpit:
    image: docker.io/axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    env_file:
      - .env
    volumes:
      - mailpit_data:/data

  # Postgres
  # For production we should use a managed DB service e.g AWS RDS
  db:
    image: docker.io/pgvector/pgvector:pg18
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sparkth}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  # For production we should use a redis service e.g AWS' managed redis service
  redis:
    image: docker.io/redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  mailpit_data:
