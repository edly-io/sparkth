services:
  # Sparkth App
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
      # Requires sparkth-base:local — run `make base` first (or `make up` handles it automatically)
    # 'sparkth:local' is the local dev image built from Dockerfile.local. In production, use the image published
    # to GitHub Container Registry by CI
    image: sparkth:local
    # In production we should always pull the remote image, the below `pull_policy` is only for local development
    pull_policy: never
    restart: unless-stopped
    ports:
      - "127.0.0.1:7727:7727"
    # Below id the deafult command `fastapi run ...` which runs fastapi without hot-reload.
    # The "make up" commands starts the container without hot-reload
    # The "make up.dev" command sets the `APP_COMMAND` env to `fastapi dev ...` and then runs the container
    # this causes the container to run with hot-reload (i.e in development mode)
    #
    # For production environment, this docker-comopse file is not used so the following `command` is not used.
    # The production contianers are orchestrated by kubernetes and that container's command is dictated by the
    # CMD statement in the Dockerfile
    command: ${APP_COMMAND:-fastapi run --host 0.0.0.0 app/main.py}
    env_file:
      - .env
      - path: .env.local
        required: false
    volumes:
      - ./app:/app/app
      - ./frontend/out:/app/frontend/out
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      rag-mcp:
        condition: service_started
      mailpit:
        condition: service_started

  # Mailpit (local SMTP for development)
  # For production we should use AWS's managed email services such as AWS SES STMP interface
  mailpit:
    image: docker.io/axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    env_file:
      - .env
    volumes:
      - mailpit_data:/data

  # Postgres
  # For production we should use a managed DB service e.g AWS RDS
  db:
    image: docker.io/pgvector/pgvector:pg18
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sparkth}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  # For production we should use a redis service e.g AWS' managed redis service
  redis:
    image: docker.io/redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # RAG Cleanup Job
  # In production this contianer is meant to be run via a scheduled cronjob.
  rag-cleanup:
    # 'sparkth:local' is hte local dev image built from Dockerfile.local. In production, use the image published
    # to GitHub Container Registry by CI
    image: sparkth:local
    # In production we should always pull the remote image, the below `pull_policy` is only for local development
    pull_policy: never
    env_file:
      - .env
      - path: .env.local
        required: false
    command: python -m app.rag.cleanup
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # RAG Metadata MCP Server
  rag-mcp:
    # 'sparkth:local' is hte local dev image built from Dockerfile.local. In production, use the image published
    # to GitHub Container Registry by CI
    image: sparkth:local
    # In production we should always pull the remote image, the below `pull_policy` is only for local development
    pull_policy: never
    # For production we should keep the restart policy the same.
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    volumes:
      - ./app:/app/app
    command: python -m app.rag_mcp.main
    depends_on:
      db:
        condition: service_healthy

  # Alembic Migrations
  # In production this is meant to be run as a k8s 'Job'. It could be an 'initContainer' for the above 'app' container
  # or it could be a standalone job that runs before the 'app' container is deployed.
  migrations:
    # 'sparkth:local' is hte local dev image built from Dockerfile.local. In production, use the image published
    # to GitHub Container Registry by CI
    image: sparkth:local
    # In production we should always pull the remote image, the below `pull_policy` is only for local development
    pull_policy: never
    env_file:
      - .env
      - path: .env.local
        required: false
    volumes:
      - ./app:/app/app
    command: alembic upgrade head
    # For production we should set the restat policy to 'no', sicne the only purpose of this job is to apply migrations and exit.
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  mailpit_data:
