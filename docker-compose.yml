services:
  # Sparkth App
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
      # Requires sparkth-base:local — run `make base` first (or `make up` handles it automatically)
    image: sparkth:local
    pull_policy: never
    restart: unless-stopped
    ports:
      - "127.0.0.1:7727:7727"
    command: ${APP_COMMAND:-fastapi run --host 0.0.0.0 app/main.py}
    env_file:
      - .env
      - path: .env.local
        required: false
    volumes:
      - ./app:/app/app
      - ./frontend/out:/app/frontend/out
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      rag-mcp:
        condition: service_started
      mailpit:
        condition: service_started

  # Mailpit (local SMTP for development)
  mailpit:
    image: docker.io/axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    env_file:
      - .env
    volumes:
      - mailpit_data:/data

  # Postgres
  db:
    image: docker.io/pgvector/pgvector:pg18
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sparkth}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: docker.io/redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # RAG Cleanup Job
  rag-cleanup:
    image: sparkth:local
    pull_policy: never
    env_file:
      - .env
      - path: .env.local
        required: false
    command: python -m app.rag.cleanup
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # RAG Metadata MCP Server
  rag-mcp:
    image: sparkth:local
    pull_policy: never
    restart: unless-stopped
    env_file:
      - .env
      - path: .env.local
        required: false
    volumes:
      - ./app:/app/app
    command: python -m app.rag_mcp.main
    depends_on:
      db:
        condition: service_healthy

  # Alembic Migrations
  migrations:
    image: sparkth:local
    pull_policy: never
    env_file:
      - .env
      - path: .env.local
        required: false
    volumes:
      - ./app:/app/app
    command: alembic upgrade head
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  mailpit_data:
