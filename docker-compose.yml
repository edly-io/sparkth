services:
  # Sparkth App
  app:
    container_name: sparkth-app
    build:
      context: .
      dockerfile: Dockerfile.local
      # Requires sparkth-base:local — run `make base` first (or `make up` handles it automatically)
    image: sparkth:local
    pull_policy: never
    restart: unless-stopped
    ports:
      - "127.0.0.1:7727:7727"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sparkth}:${POSTGRES_PASSWORD:-sparkth_password}@db:5432/${POSTGRES_DB:-sparkth}
      REDIS_URL: redis://redis:6379
      PORT: "7727"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_USE_TLS: "false"
    volumes:
      - ./app:/app/app
      - ./frontend/out:/app/frontend/out
      - .ignored/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      rag-mcp:
        condition: service_started
      mailpit:
        condition: service_started

  # Mailpit (local SMTP for development)
  mailpit:
    container_name: sparkth-mailpit
    image: docker.io/axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    volumes:
      - mailpit_data:/data

  # Postgres
  db:
    container_name: sparkth-db
    image: docker.io/pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sparkth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sparkth_password}
      POSTGRES_DB: ${POSTGRES_DB:-sparkth}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sparkth}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    container_name: sparkth-redis
    image: docker.io/redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # RAG Cleanup Job
  rag-cleanup:
    image: sparkth:local
    container_name: sparkth-rag-cleanup
    pull_policy: never
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sparkth}:${POSTGRES_PASSWORD:-sparkth_password}@db:5432/${POSTGRES_DB:-sparkth}
    command: python -m app.rag.cleanup
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # RAG Metadata MCP Server
  rag-mcp:
    container_name: sparkth-rag-mcp
    image: sparkth:local
    pull_policy: never
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sparkth}:${POSTGRES_PASSWORD:-sparkth_password}@db:5432/${POSTGRES_DB:-sparkth}
    volumes:
      - ./app:/app/app
    command: python -m app.rag_mcp.main
    depends_on:
      db:
        condition: service_healthy

  # Alembic Migrations
  migrations:
    image: sparkth:local
    container_name: sparkth-migrations
    pull_policy: never
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sparkth}:${POSTGRES_PASSWORD:-sparkth_password}@db:5432/${POSTGRES_DB:-sparkth}
    volumes:
      - ./app:/app/app
    command: alembic upgrade head
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  mailpit_data:
