services:
  # ----------------------------------------
  # Sparkth API Service
  # ----------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.local
      # Requires sparkth-base:local — run `make base` first (or `make up` handles it automatically)
    image: sparkth:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:7727:7727"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sparkth:sparkth_password@db:5432/sparkth
      REDIS_URL: redis://redis:6379
      PORT: "7727"
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - ./app:/app/app
      - ./frontend/out:/app/frontend/out
      - .ignored/logs:/app/logs
    depends_on:
      - db
      - redis
      - rag-mcp

  # ----------------------------------------
  # Postgres
  # ----------------------------------------
  db:
    image: docker.io/pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: sparkth
      POSTGRES_PASSWORD: sparkth_password
      POSTGRES_DB: sparkth
    volumes:
      - postgres_data:/var/lib/postgresql

  # ----------------------------------------
  # Redis
  # ----------------------------------------
  redis:
    image: docker.io/redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # ----------------------------------------
  # RAG Cleanup Job
  # ----------------------------------------
  rag-cleanup:
    image: sparkth:local
    pull_policy: never
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sparkth:sparkth_password@db:5432/sparkth
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - ./app:/app/app
    command: python -m app.rag.cleanup
    depends_on:
      - db
    restart: "no"

  # ----------------------------------------
  # RAG Metadata MCP Server
  # ----------------------------------------
  rag-mcp:
    image: sparkth:local
    pull_policy: never
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sparkth:sparkth_password@db:5432/sparkth
      TOKENIZERS_PARALLELISM: "false"
    volumes:
      - ./app:/app/app
    command: python -m app.rag_mcp.main
    depends_on:
      - db

  # ----------------------------------------
  # Alembic Migrations
  # ----------------------------------------
  migrations:
    image: sparkth:local
    pull_policy: never
    environment:
      DATABASE_URL: postgresql://sparkth:sparkth_password@db:5432/sparkth
    volumes:
      - ./app:/app/app
    command: >
      sh -c "
      echo '⏳ Waiting for DB...' &&
      alembic upgrade head &&
      echo '✅ Alembic migrations complete'
      "
    depends_on:
      - db

volumes:
  postgres_data:
  redis_data:
