name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Lint (oxlint)
        run: bun run lint
        working-directory: frontend

      - name: Check formatting (oxfmt)
        run: bun run format:check
        working-directory: frontend

  backend:
    name: Backend Lint, Type Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --dev

      - name: Check formatting (ruff)
        run: uv run ruff format --check .

      - name: Check import sorting (ruff)
        run: uv run ruff check --select I .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy --strict app/ tests/

      - name: Run tests
        run: uv run pytest tests/
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: secret-key-for-ci
          SLACK_CLIENT_ID: fake-client-id
          SLACK_CLIENT_SECRET: fake-client-secret
          SLACK_SIGNING_SECRET: fake-signing-secret
          SLACK_REDIRECT_URI: http://localhost/callback
          RAG_MCP_URL: http://localhost:7728/mcp
          LLM_ENCRYPTION_KEY: 8HwUaoTLinOIFkWmQubN5KvtZYEP_PoE5CTVonz23A0=
