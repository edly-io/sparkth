name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Lint (oxlint)
        run: bun run lint
        working-directory: frontend

      - name: Check formatting (oxfmt)
        run: bun run format:check
        working-directory: frontend

  backend:
    name: Backend Lint, Type Check & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install the project
        run: make backend.install.dev.requirements

      - name: Run backend linting tests
        run: make lint.backend

      - name: Run type checks
        run: make mypy

      - name: Run unit tests
        run: make test.backend.pytest

      - name: Run formatting tests
        run: make test.backend.format
