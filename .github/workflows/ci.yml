# Troubleshoot with act https://github.com/nektos/act
# act pull_request --workflows ./.github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend Lint, Test & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: make frontend.install

      # Single high-level target so a CI failure reproduces locally with
      # exactly `make test.frontend` (lint + vitest + format check).
      - name: Run frontend tests
        run: make test.frontend

  backend:
    name: Backend Lint, Type Check, Test & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install the project
        run: make backend.install.dev.requirements

      # Single high-level target so a CI failure reproduces locally with
      # exactly `make test.backend` (lint + mypy + pytest + format check).
      - name: Run backend tests
        run: make test.backend
