# Troubleshoot with act https://github.com/nektos/act
# act pull_request --workflows ./.github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  frontend:
    name: Frontend Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: make frontend.install

      - name: Lint (oxlint)
        run: make lint.frontend

      # TODO uncomment this once frontend unit tests are fixed
      # - name: Run unit tests
      #   run: make test.frontend.vitest

      - name: Check formatting (oxfmt)
        run: make test.frontend.format

  backend:
    name: Backend Lint, Type Check & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install the project
        run: make backend.install.dev.requirements

      - name: Run backend linting tests
        run: make lint.backend

      - name: Run type checks
        run: make mypy

      - name: Run unit tests
        run: make test.backend.pytest

      - name: Run formatting tests
        run: make test.backend.format
