name: Playwright Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            changed:
              - app/**
              - frontend/**
              - tests/**
              - alembic.ini
              - pyproject.toml
              - uv.lock
              - .github/workflows/playwright.yml

  playwright:
    needs: changes
    if: ${{ needs.changes.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: sparkth
          POSTGRES_PASSWORD: sparkth_password
          POSTGRES_DB: sparkth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sparkth -d sparkth"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
        env:
          MP_SMTP_AUTH_ACCEPT_ANY: "1"
          MP_SMTP_AUTH_ALLOW_INSECURE: "1"

    env:
      # Sync form; app/core/db.py builds the sync engine from this URL and
      # derives the async URL automatically. Alembic also reads this var.
      DATABASE_URL: postgresql://sparkth:sparkth_password@localhost:5432/sparkth
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: secret-key-for-ci
      LLM_ENCRYPTION_KEY: 8HwUaoTLinOIFkWmQubN5KvtZYEP_PoE5CTVonz23A0=
      # Default is False; sign-up specs and the "prompts unverified users"
      # login spec hit /api/v1/auth/register, which 403s when disabled.
      REGISTRATION_ENABLED: "true"
      SLACK_CLIENT_ID: fake-client-id
      SLACK_CLIENT_SECRET: fake-client-secret
      SLACK_SIGNING_SECRET: fake-signing-secret
      SLACK_REDIRECT_URI: http://localhost/callback
      RAG_MCP_URL: http://localhost:7728/mcp
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_USE_TLS: "false"
      SMTP_FROM_EMAIL: no-reply@sparkth.local
      SMTP_FROM_NAME: Sparkth
      # The API serves the built frontend statically on the same origin in
      # production (see app/main.py), so the suite runs against :7727 with no
      # /api proxy gap to bridge.
      FRONTEND_BASE_URL: http://localhost:7727
      FIRST_SUPERUSER: admin
      FIRST_SUPERUSER_PASSWORD: "Sparkth-admin-1!"
      FIRST_SUPERUSER_EMAIL: admin@sparkth.local

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python deps
        # The `ml` extra (langchain-huggingface, sentence-transformers) is
        # required because the app's lifespan loads the embedding provider on
        # startup; without it, uvicorn exits before binding to :7727.
        run: uv sync --locked --dev --extra ml

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend deps
        run: bun install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend (static export)
        run: bun run build
        working-directory: frontend

      - name: Run database migrations
        run: uv run alembic upgrade head

      - name: Seed E2E superuser
        run: |
          uv run python -m app.cli.main users create-user \
            --username "$FIRST_SUPERUSER" \
            --email "$FIRST_SUPERUSER_EMAIL" \
            --password "$FIRST_SUPERUSER_PASSWORD" \
            --superuser \
            --email-verified

      - name: Seed E2E whitelist (@example.com domain)
        # randomUser() in frontend/tests/utils/user.ts generates @example.com
        # addresses. Registration enforces a domain/email whitelist (see
        # app/services/whitelist.py), so an empty table 403s every signup.
        run: |
          uv run python -c "
          from sqlmodel import Session
          from app.core.db import get_engine
          from app.models.whitelist import WhitelistedEmail
          with Session(get_engine()) as s:
              s.add(WhitelistedEmail(value='@example.com', entry_type='domain'))
              s.commit()
          "

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start API (serves frontend + API on :7727)
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 7727 > api.log 2>&1 &
          for i in {1..60}; do
            curl -fsS http://localhost:7727/docs > /dev/null && break
            echo "waiting for API ($i)..."
            sleep 1
          done
          curl -fsS http://localhost:7727/docs > /dev/null || { echo "::error::API failed to start within 60s"; exit 1; }

      - name: Run Playwright tests
        working-directory: frontend
        env:
          PLAYWRIGHT_NO_WEBSERVER: "1"
          PLAYWRIGHT_BASE_URL: http://localhost:7727
          PLAYWRIGHT_API_URL: http://localhost:7727
          MAILPIT_URL: http://localhost:8025
        run: bunx playwright test --reporter=blob

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report
          path: frontend/blob-report
          retention-days: 7

      - name: Upload API logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: api.log
          retention-days: 3
