name: Publish Documentation

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
      - pyproject.toml
      - uv.lock
      - .github/workflows/docs.yml
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Least-privilege token: read the repo, write Pages, mint the deployment id-token.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments; don't cancel an in-progress one (it publishes live).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      # `make docs` builds the site to site/ with `mkdocs build --strict`.
      - name: Build site
        run: make docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
